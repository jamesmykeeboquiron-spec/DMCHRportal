<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Employees | D-Mezzanine HR Portal</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100%;
background:#111827;
padding:20px;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:35px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
border:3px solid #facc15;
background:white;
}

.logo h2{
font-size:20px;
color:#facc15;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
text-decoration:none;
}

.menu button{
width:100%;
background:#1e293b;
border:none;
padding:15px;
border-radius:12px;
color:white;
text-align:left;
cursor:pointer;
font-size:15px;
transition:.3s;
}

.menu button i{
margin-right:10px;
color:#facc15;
}

.menu button:hover,
.menu button.active{
background:#facc15;
color:#111827;
transform:translateX(5px);
}

.menu button:hover i,
.menu button.active i{
color:#111827;
}

/* MAIN */

.main{
margin-left:260px;
padding:25px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.topbar h1{
font-size:30px;
}

.admin-box{
background:#1e293b;
padding:12px 18px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
}

.admin-box img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat-card{
background:#1e293b;
padding:22px;
border-radius:18px;
}

.stat-card i{
font-size:32px;
color:#facc15;
margin-bottom:15px;
}

.stat-card h2{
font-size:30px;
margin-bottom:5px;
}

/* TABLE */

.table-box{
background:#1e293b;
padding:20px;
border-radius:20px;
overflow-x:auto;
}

.table-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:15px;
}

.search-box{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.search-box input{
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#0f172a;
color:white;
width:250px;
}

.add-btn{
background:#facc15;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0f172a;
padding:15px;
text-align:left;
}

table td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.employee-info{
display:flex;
align-items:center;
gap:12px;
}

.employee-info img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

.status{
padding:6px 12px;
border-radius:30px;
font-size:13px;
font-weight:bold;
}

.active{
background:#14532d;
color:#4ade80;
}

.leave{
background:#7f1d1d;
color:#f87171;
}

.action-btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
}

.edit{
background:#2563eb;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-content{
background:#1e293b;
padding:25px;
border-radius:20px;
width:100%;
max-width:500px;
}

.modal-content h2{
margin-bottom:20px;
}

.modal-content input,
.modal-content select{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
}

.modal-content button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.save-btn{
background:#facc15;
margin-right:10px;
}

.close-btn{
background:#dc2626;
color:white;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
width:80px;
padding:15px;
}

.logo h2,
.menu button span{
display:none;
}

.menu button{
text-align:center;
}

.menu button i{
margin:0;
font-size:18px;
}

.main{
margin-left:80px;
}

}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<img src="logo.png">
<h2>D-Mezzanine</h2>
</div>

<div class="menu">

<a href="index.html">
<button>
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</button>
</a>

<a href="employee.html">
<button class="active">
<i class="fa-solid fa-users"></i>
<span>Employees</span>
</button>
</a>

<a href="#">
<button>
<i class="fa-solid fa-money-check-dollar"></i>
<span>Payroll</span>
</button>
</a>

<a href="#">
<button>
<i class="fa-solid fa-calendar-check"></i>
<span>Attendance</span>
</button>
</a>

<a href="#">
<button>
<i class="fa-solid fa-file-invoice-dollar"></i>
<span>Payslips</span>
</button>
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>Employee Management</h1>

<div class="admin-box">
<img src="https://i.imgur.com/6VBx3io.png">
<div>
<h4>Admin</h4>
<small>HR Manager</small>
</div>
</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-card">
<i class="fa-solid fa-users"></i>
<h2 id="totalEmployee">5</h2>
<p>Total Employees</p>
</div>

<div class="stat-card">
<i class="fa-solid fa-user-check"></i>
<h2>4</h2>
<p>Active Employees</p>
</div>

<div class="stat-card">
<i class="fa-solid fa-user-clock"></i>
<h2>1</h2>
<p>On Leave</p>
</div>

</div>

<!-- TABLE -->

<div class="table-box">

<div class="table-header">

<h2>Employee List</h2>

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Search employee...">

<button class="add-btn"
onclick="openModal()">
<i class="fa-solid fa-plus"></i>
Add Employee
</button>

</div>

</div>

<table>

<thead>
<tr>
<th>Employee</th>
<th>Position</th>
<th>Department</th>
<th>Salary</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="employeeTable">

<tr>

<td>
<div class="employee-info">
<img src="https://i.imgur.com/6VBx3io.png">
<div>
<b>Juan Dela Cruz</b><br>
<small>EMP-1001</small>
</div>
</div>
</td>

<td>Cashier</td>
<td>Operations</td>
<td>₱15,000</td>

<td>
<span class="status active">
Active
</span>
</td>

<td>
<button class="action-btn edit">
<i class="fa-solid fa-pen"></i>
</button>

<button class="action-btn delete"
onclick="deleteRow(this)">
<i class="fa-solid fa-trash"></i>
</button>
</td>

</tr>

<tr>

<td>
<div class="employee-info">
<img src="https://i.imgur.com/9Xn4F6P.png">
<div>
<b>Maria Santos</b><br>
<small>EMP-1002</small>
</div>
</div>
</td>

<td>Barista</td>
<td>Cafe</td>
<td>₱16,500</td>

<td>
<span class="status leave">
Leave
</span>
</td>

<td>
<button class="action-btn edit">
<i class="fa-solid fa-pen"></i>
</button>

<button class="action-btn delete"
onclick="deleteRow(this)">
<i class="fa-solid fa-trash"></i>
</button>
</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="employeeModal">

<div class="modal-content">

<h2>Add Employee</h2>

<input type="text"
id="empName"
placeholder="Employee Name">

<input type="text"
id="empPosition"
placeholder="Position">

<input type="text"
id="empDepartment"
placeholder="Department">

<input type="number"
id="empSalary"
placeholder="Salary">

<select id="empStatus">
<option>Active</option>
<option>Leave</option>
</select>

<button class="save-btn"
onclick="addEmployee()">
Save Employee
</button>

<button class="close-btn"
onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

/* MODAL */

function openModal(){
document.getElementById("employeeModal")
.style.display="flex";
}

function closeModal(){
document.getElementById("employeeModal")
.style.display="none";
}

/* ADD EMPLOYEE */

function addEmployee(){

let name=
document.getElementById("empName").value;

let position=
document.getElementById("empPosition").value;

let department=
document.getElementById("empDepartment").value;

let salary=
document.getElementById("empSalary").value;

let status=
document.getElementById("empStatus").value;

if(name=="" || position=="" ||
department=="" || salary==""){

alert("Please complete all fields");
return;

}

let table=
document.getElementById("employeeTable");

let randomID=
"EMP-" + Math.floor(Math.random()*9999);

let statusClass=
status=="Active"
? "active"
: "leave";

table.innerHTML += `

<tr>

<td>
<div class="employee-info">
<img src="https://i.imgur.com/6VBx3io.png">
<div>
<b>${name}</b><br>
<small>${randomID}</small>
</div>
</div>
</td>

<td>${position}</td>
<td>${department}</td>
<td>₱${salary}</td>

<td>
<span class="status ${statusClass}">
${status}
</span>
</td>

<td>

<button class="action-btn edit">
<i class="fa-solid fa-pen"></i>
</button>

<button class="action-btn delete"
onclick="deleteRow(this)">
<i class="fa-solid fa-trash"></i>
</button>

</td>

</tr>

`;

updateCount();

closeModal();

/* CLEAR */

document.getElementById("empName").value="";
document.getElementById("empPosition").value="";
document.getElementById("empDepartment").value="";
document.getElementById("empSalary").value="";

}

/* DELETE */

function deleteRow(btn){
btn.parentElement.parentElement.remove();
updateCount();
}

/* COUNT */

function updateCount(){

let rows=
document.querySelectorAll("#employeeTable tr");

document.getElementById("totalEmployee")
.innerText=rows.length;

}

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let rows=
document.querySelectorAll("#employeeTable tr");

rows.forEach(row=>{

row.style.display=
row.innerText.toLowerCase()
.includes(value)
? ""
: "none";

});

});

</script>

</body>
</html>
